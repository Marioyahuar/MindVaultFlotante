<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindVault</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <div class="indicadores">
      <span class="indicador" title="Claude Code disponible en PATH">
        <span class="punto" id="punto-claude"></span>
        <span class="label" id="label-claude">Claude</span>
      </span>
      <span class="indicador" title="MindVault MCP configurado en ~/.claude.json">
        <span class="punto" id="punto-mcp"></span>
        <span class="label" id="label-mcp">MindVault MCP</span>
      </span>
    </div>

    <textarea
      id="texto"
      placeholder="Pegá o escribí lo que querés guardar en MindVault..."
      rows="6"
      autofocus
    ></textarea>

    <div id="mensaje-estado" class="mensaje-estado oculto"></div>

    <button id="btn-enviar" type="button">Guardar</button>
  </div>

  <script type="module" src="/main.ts"></script>
</body>
</html>
